<app-header title="Water Can Tracker"></app-header>

<ion-content class="ion-padding">
  <!-- Stats Cards -->
  <div class="stats-grid">
    <ion-card class="stat-card">
      <ion-card-content>
        <div class="stat-icon-wrapper blue">
          <ion-icon name="water"></ion-icon>
        </div>
        <div class="stat-value">{{ totalCans }}</div>
        <div class="stat-label">Total Cans</div>
      </ion-card-content>
    </ion-card>

    <ion-card class="stat-card">
      <ion-card-content>
        <div class="stat-icon-wrapper green">
          <ion-icon name="cash"></ion-icon>
        </div>
        <div class="stat-value">{{ totalSpent | appCurrency }}</div>
        <div class="stat-label">Total Spent</div>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Usage Section with Toggle -->
  <div class="usage-section">
    <h3 class="section-title">
      <ion-icon name="analytics-outline"></ion-icon>
      {{ usageType === 'weekly' ? 'Weekly' : 'Monthly' }} Usage
    </h3>

    <app-usage-toggle
      [selectedType]="usageType"
      (typeChange)="onUsageTypeChange($event)"
    ></app-usage-toggle>

    <app-usage-list
      [summaries]="usageSummaries"
      [usageType]="usageType"
    ></app-usage-list>
  </div>

  <!-- Add Entry Form -->
  <ion-card class="add-card">
    <ion-card-header>
      <ion-card-title class="form-title">
        <ion-icon name="add-circle-outline"></ion-icon>
        Add Purchase
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="none" class="input-item">
        <ion-label position="stacked">Number of Cans</ion-label>
        <ion-input
          type="number"
          [(ngModel)]="newCans"
          placeholder="e.g. 2"
          min="1"
          class="custom-input"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-label position="stacked">Price per Can (₹)</ion-label>
        <ion-input
          type="number"
          [(ngModel)]="newPrice"
          placeholder="e.g. 30"
          min="1"
          class="custom-input"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-label position="stacked">Note (optional)</ion-label>
        <ion-input
          type="text"
          [(ngModel)]="newNote"
          placeholder="e.g. Office delivery"
          class="custom-input"
        ></ion-input>
      </ion-item>

      <ion-button
        expand="block"
        (click)="addEntry()"
        [disabled]="!newCans || newCans < 1"
        class="add-button"
      >
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Add {{ newCans || 0 }} Can{{ newCans !== 1 ? 's' : '' }}
        <span *ngIf="newCans && newPrice" class="button-cost">
          &nbsp;· {{ (newCans * newPrice) | appCurrency }}
        </span>
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Purchase History -->
  <app-water-history
    [entries]="entries"
    (onDelete)="deleteEntry($event)"
  ></app-water-history>
</ion-content>
